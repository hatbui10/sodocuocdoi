<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Đồ Cuộc Đời - Fix Lỗi</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 0 auto; }
        .field-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 25px 10px; border-radius: 12px; text-align: center; cursor: pointer;
            font-weight: bold; font-size: 14px;
        }
        .field-btn:active { transform: scale(0.95); }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; z-index:9; backdrop-filter: blur(4px); }
        #modal { position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; display:none; z-index:10; border: 1px solid var(--accent); text-align: center; }
        textarea { width: 100%; height: 120px; padding: 12px; margin: 15px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .save-btn { background: var(--accent); color: #0f172a; font-weight: bold; width: 100%; padding: 14px; border-radius: 10px; border: none; cursor: pointer; }
        /* Hiệu ứng khi nút đang ở trạng thái Success */
.save-btn.success {
    background-color: #22c55e !important; /* Màu xanh lá */
    color: white;
}

/* Hiệu ứng rung nhẹ khi di chuột vào (Hover) */
.field-btn:hover {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
    background: #2d3748;
}

/* Hiệu ứng loading đơn giản */
.save-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}
        
    </style>
</head>
<body>

    <h2 style="text-align: center; color: var(--accent); margin-bottom: 30px;">MY LIFE MAP</h2>
    
    <div class="grid">
        <div class="field-btn" onclick="openBox('nha', 'Nhà cửa')">🏠 Nhà cửa</div>
        <div class="field-btn" onclick="openBox('job', 'Công việc')">💼 Công việc</div>
        <div class="field-btn" onclick="openBox('kn', 'Kỹ năng')">⚡ Kỹ năng</div>
        <div class="field-btn" onclick="openBox('sk', 'Sức khỏe')">💪 Sức khỏe</div>
        <div class="field-btn" onclick="openBox('tc', 'Tài chính')">💰 Tài chính</div>
        <div class="field-btn" onclick="openBox('gd', 'Gia đình')">❤️ Gia đình</div>
        <div class="field-btn" onclick="openBox('bb', 'Bạn bè')">🤝 Bạn bè</div>
        <div class="field-btn" onclick="openBox('hv', 'Học vấn')">📚 Học vấn</div>
        <div class="field-btn" onclick="openBox('gt', 'Giải trí')">🎮 Giải trí</div>
        <div class="field-btn" onclick="openBox('tl', 'Tâm linh')">🧘 Tâm linh</div>
        <div class="field-btn" onclick="openBox('mt', 'Mục tiêu')">🚀 Mục tiêu</div>
    </div>

    <div class="overlay" id="bg-fade" onclick="closeBox()"></div>
    <div id="modal">
        <h3 id="m-label" style="margin:0; color:var(--accent)">...</h3>
        <textarea id="m-input" placeholder="Nhập nội dung vào đây..."></textarea>
        <button class="save-btn" onclick="saveData()">LƯU LÊN CLOUD</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1ddvaaA4iQcTwEnvg0havIt6RsxcBkN4",
            authDomain: "sodocuocdoi.firebaseapp.com",
           projectId: "sodocuocdoi-fb23f",
            storageBucket: "sodocuocdoi.firebasestorage.app",
            messagingSenderId: "343754660099",
            appId: "1:343754660099:web:c916d3f1429a30b643136"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let curId = '';

        window.openBox = async (id, title) => {
            curId = id;
            document.getElementById('m-label').innerText = title;
            document.getElementById('bg-fade').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            document.getElementById('m-input').value = "Đang kiểm tra...";

            try {
                const s = await getDoc(doc(db, "LifeDataFinal", id));
                // Nếu có dữ liệu thì hiện, nếu không thì để trống cho người dùng nhập
                document.getElementById('m-input').value = s.exists() ? s.data().t : "";
            } catch (e) {
                console.error(e);
                document.getElementById('m-input').value = ""; // Nếu lỗi thì cứ cho nhập mới
              
            }
        };

        window.closeBox = () => {
            document.getElementById('bg-fade').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        };

        window.saveData = async () => {
    const btn = document.querySelector('.save-btn');
    const input = document.getElementById('m-input');
    const val = input.value;
    const originalText = "LƯU LÊN CLOUD";

    // Trạng thái: Bắt đầu lưu
    btn.disabled = true;
    btn.innerText = "ĐANG LƯU...";

    // Lưu vào Local Storage ngay lập tức
    localStorage.setItem('life_' + curId, val);
    
    try {
        // Lưu lên Firebase
        await setDoc(doc(db, "LifeDataFinal", curId), { t: val });

        // Trạng thái: Thành công
        btn.classList.add('success');
        btn.innerText = "ĐÃ LƯU XONG! ✓";

        // Đợi 1.5 giây rồi đóng modal hoặc reset nút
        setTimeout(() => {
            btn.classList.remove('success');
            btn.innerText = originalText;
            btn.disabled = false;
            closeBox(); // Đóng bảng nhập sau khi lưu xong
        }, 1500);

    } catch (e) {
        console.error(e);
        btn.style.backgroundColor = "#ef4444"; // Đổi màu đỏ nếu lỗi
        btn.innerText = "LỖI KẾT NỐI!";
        
        setTimeout(() => {
            btn.style.backgroundColor = "";
            btn.innerText = originalText;
            btn.disabled = false;
        }, 3000);
    }
};
    </script>
</body>
</html>
