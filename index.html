<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Map - 20 Core Categories</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        h2 { text-align: center; color: var(--accent); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; }
        
        .field-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 20px 10px; border-radius: 12px; text-align: center; cursor: grab;
            font-weight: bold; font-size: 13px; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .field-btn:hover { border-color: var(--accent); background: #2d3748; transform: translateY(-3px); }
        .field-btn span { font-size: 24px; }

        .add-main-btn { border: 2px dashed var(--border); background: transparent; color: var(--accent); font-size: 24px; cursor: pointer; }

        /* Modal & UI Elements */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; z-index:9; backdrop-filter: blur(8px); }
        #modal, #icon-picker { position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; display:none; z-index:10; border: 1px solid var(--accent); }
        
        textarea { width: 100%; height: 100px; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .sub-folder-container { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .folder-item { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .save-btn { background: var(--accent); color: #0f172a; }
        .add-folder-btn { background: #6366f1; color: white; }
        .back-btn { background: #475569; color: white; width: 100%; margin-bottom: 10px; }
        
        .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .icon-item { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 8px; text-align: center; }
        .icon-item:hover { background: var(--border); }
    </style>
</head>
<body>

    <h2>MY LIFE MAP</h2>
    
    <div class="grid" id="mainGrid">
        <div class="field-btn" data-id="kienthuc"><span>🧠</span>Kiến thức</div>
        <div class="field-btn" data-id="kynang"><span>⚡</span>Kỹ năng</div>
        <div class="field-btn" data-id="nangluc"><span>🚀</span>Năng lực</div>
        <div class="field-btn" data-id="muctieu"><span>🎯</span>Mục tiêu hướng đến</div>
        <div class="field-btn" data-id="nhiemvu"><span>📋</span>Nhiệm vụ</div>
        <div class="field-btn" data-id="nguyentac"><span>⚖️</span>Nguyên tắc làm việc</div>
        <div class="field-btn" data-id="thietbi"><span>🛠️</span>Thiết bị</div>
        <div class="field-btn" data-id="congcu"><span>🔧</span>Công cụ</div>
        <div class="field-btn" data-id="nguoncungcap"><span>📦</span>Nguồn cung cấp</div>
        <div class="field-btn" data-id="thoigian"><span>⏰</span>Thời gian</div>
        <div class="field-btn" data-id="thoiquen"><span>🔄</span>Thói quen</div>
        <div class="field-btn" data-id="antoan"><span>🛡️</span>An toàn</div>
        <div class="field-btn" data-id="suckhoe"><span>💪</span>Sức khỏe</div>
        <div class="field-btn" data-id="phuocbau"><span>🌱</span>Phước báu</div>
        <div class="field-btn" data-id="tinhthan"><span>🌈</span>Tinh thần</div>
        <div class="field-btn" data-id="camxuc"><span>🎭</span>Cảm xúc</div>
        <div class="field-btn" data-id="moihuongsong"><span>✨</span>Mối hướng sống</div>
        <div class="field-btn" data-id="luachon"><span>📂</span>Lựa chọn</div>
        <div class="field-btn" data-id="nghenghiep"><span>🏗️</span>Nghề nghiệp</div>
        <div class="field-btn" data-id="banbe"><span>🤝</span>Bạn bè</div>

        <div class="field-btn add-main-btn" id="btnAddNewMain">+</div>
    </div>

    <div id="icon-picker">
        <h4 style="margin:0 0 10px 0; color:var(--accent)">Thêm mục mới</h4>
        <input type="text" id="new-cat-name" placeholder="Nhập tên mục..." style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#0f172a; color:white; margin-bottom:10px;">
        <div class="icon-grid" id="icon-list"></div>
        <div class="actions">
            <button class="back-btn" onclick="closeIconPicker()">Hủy</button>
            <button class="save-btn" onclick="confirmAddCategory()">Xác nhận</button>
        </div>
    </div>

    <div class="overlay" id="bg-fade" onclick="closeBox()"></div>
    
    <div id="modal">
        <button class="back-btn" id="btnBack" style="display:none;">← Quay lại</button>
        <h3 id="m-label" style="margin:0; color:var(--accent)">...</h3>
        <textarea id="m-input" placeholder="Ghi chú kế hoạch/nội dung tại đây..."></textarea>
        <div class="actions">
            <button class="add-folder-btn" onclick="addNewFolder()">+ Tạo mục con</button>
            <button class="save-btn" onclick="saveCurrentData()">LƯU LẠI</button>
        </div>
        <div class="sub-folder-container">
            <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">DANH MỤC CON:</p>
            <div id="sub-folders-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1ddvaaA4iQcTwEnvg0havIt6RsxcBkN4",
            authDomain: "sodocuocdoi.firebaseapp.com",
            projectId: "sodocuocdoi-fb23f",
            storageBucket: "sodocuocdoi.firebasestorage.app",
            messagingSenderId: "343754660099",
            appId: "1:343754660099:web:c916d3f1429a30b643136"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Kéo thả sắp xếp
        Sortable.create(document.getElementById('mainGrid'), { animation: 150 });

        let historyPath = [];
        let selectedIcon = "🚀";
        const icons = ["🏠","💼","⚡","💪","💰","❤️","🤝","📚","🎮","🚀","🎯","🔥","✨","🎨","📸","🎵","🌍","📍","🔑","💡","⏰","📅","🛠️","🛒","🏥","🌱","🏆","📣","💻","📱"];

        // Render danh sách icon
        const iconListDiv = document.getElementById('icon-list');
        icons.forEach(icon => {
            const span = document.createElement('span');
            span.className = 'icon-item';
            span.innerText = icon;
            span.onclick = () => {
                document.querySelectorAll('.icon-item').forEach(i => i.style.background = 'transparent');
                span.style.background = 'var(--accent)';
                selectedIcon = icon;
            };
            iconListDiv.appendChild(span);
        });

        // Xử lý mở Modal thêm mới
        document.getElementById('btnAddNewMain').onclick = () => {
            document.getElementById('bg-fade').style.display = 'block';
            document.getElementById('icon-picker').style.display = 'block';
        };

        window.closeIconPicker = () => {
            document.getElementById('icon-picker').style.display = 'none';
            document.getElementById('bg-fade').style.display = 'none';
        };

        window.confirmAddCategory = () => {
            const name = document.getElementById('new-cat-name').value;
            if (!name) { alert("Vui lòng nhập tên!"); return; }
            const id = 'custom_' + Date.now();
            
            const grid = document.getElementById('mainGrid');
            const btnPlus = document.getElementById('btnAddNewMain');
            const newDiv = document.createElement('div');
            newDiv.className = 'field-btn';
            newDiv.dataset.id = id;
            newDiv.innerHTML = `<span>${selectedIcon}</span>${name}`;
            newDiv.onclick = () => openBox(id, name);
            
            grid.insertBefore(newDiv, btnPlus);
            closeIconPicker();
            document.getElementById('new-cat-name').value = "";
        };

        // Logic chính: Mở hộp thoại nội dung
        window.openBox = async (id, title) => {
            historyPath.push({id, title});
            document.getElementById('m-label').innerText = title;
            document.getElementById('bg-fade').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            document.getElementById('btnBack').style.display = historyPath.length > 1 ? 'block' : 'none';

            const docRef = doc(db, "LifeMapV2", id);
            const s = await getDoc(docRef);
            document.getElementById('m-input').value = s.exists() ? (s.data().t || "") : "";

            const listDiv = document.getElementById('sub-folders-list');
            listDiv.innerHTML = "";
            if (s.exists() && s.data().subs) {
                s.data().subs.forEach(sub => {
                    const item = document.createElement('div');
                    item.className = 'folder-item';
                    item.innerHTML = `<span>📁 ${sub.name}</span> <span>›</span>`;
                    item.onclick = (e) => {
                        e.stopPropagation();
                        openBox(`${id}_${sub.id}`, sub.name);
                    };
                    listDiv.appendChild(item);
                });
            }
        };

        window.saveCurrentData = async () => {
            const active = historyPath[historyPath.length - 1];
            try {
                await setDoc(doc(db, "LifeMapV2", active.id), { t: document.getElementById('m-input').value }, { merge: true });
                alert("Đã lưu thành công!");
            } catch (e) {
                alert("Lỗi khi lưu: " + e.message);
            }
        };

        window.addNewFolder = async () => {
            const name = prompt("Tên mục con mới (VD: Việc quan trọng, Ghi chú ngày...):");
            if (!name) return;
            const active = historyPath[historyPath.length - 1];
            const subId = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s/g, '-');
            
            await setDoc(doc(db, "LifeMapV2", active.id), { 
                subs: arrayUnion({ id: subId, name: name }) 
            }, { merge: true });
            
            const current = historyPath.pop();
            openBox(current.id, current.title);
        };

        window.closeBox = () => {
            document.getElementById('bg-fade').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
            document.getElementById('icon-picker').style.display = 'none';
            historyPath = [];
        };

        document.getElementById('btnBack').onclick = () => {
            historyPath.pop(); // Bỏ cái hiện tại
            const prev = historyPath.pop(); // Lấy cái trước đó
            openBox(prev.id, prev.title);
        };

        // Gán sự kiện click cho các nút mặc định
        document.querySelectorAll('.field-btn').forEach(btn => {
            if (btn.id !== 'btnAddNewMain') {
                btn.onclick = () => openBox(btn.dataset.id, btn.innerText.replace(/[^\w\sàáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/gi, '').trim());
            }
        });
    </script>
</body>
</html>
