<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Map - Folder System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        /* Grid 3x3 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .field-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 30px 10px; border-radius: 12px; text-align: center; cursor: grab;
            font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .field-btn:hover { border-color: var(--accent); background: #2d3748; }

        /* Modal */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; z-index:9; backdrop-filter: blur(8px); }
        #modal { position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; display:none; z-index:10; border: 1px solid var(--accent); }
        
        textarea { width: 100%; height: 100px; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
        
        /* Folder List Styling */
        .sub-folder-container { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .folder-item {
            background: #334155; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            transition: 0.2s;
        }
        .folder-item:hover { background: #475569; border-left: 4px solid var(--accent); }
        .folder-label { font-size: 14px; font-weight: 500; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .save-btn { background: var(--accent); color: #0f172a; }
        .add-folder-btn { background: #6366f1; color: white; }
        .back-btn { background: #475569; color: white; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: var(--accent);">MY LIFE MAP</h2>
    
    <div class="grid" id="mainGrid">
        <div class="field-btn" data-id="nha">🏠 Nhà cửa</div>
        <div class="field-btn" data-id="job">💼 Công việc</div>
        <div class="field-btn" data-id="kn">⚡ Kỹ năng</div>
        <div class="field-btn" data-id="sk">💪 Sức khỏe</div>
        <div class="field-btn" data-id="tc">💰 Tài chính</div>
        <div class="field-btn" data-id="gd">❤️ Gia đình</div>
        <div class="field-btn" data-id="bb">🤝 Bạn bè</div>
        <div class="field-btn" data-id="hv">📚 Học vấn</div>
        <div class="field-btn" data-id="gt">🎮 Giải trí</div>
    </div>

    <div class="overlay" id="bg-fade" onclick="closeBox()"></div>
    
    <div id="modal">
        <button class="back-btn" id="btnBack" style="display:none;">← Quay lại</button>
        <h3 id="m-label" style="margin:0; color:var(--accent)">...</h3>
        
        <textarea id="m-input" placeholder="Viết ghi chú tại đây..."></textarea>
        
        <div class="actions">
            <button class="add-folder-btn" onclick="addNewFolder()">+ Tạo mục con</button>
            <button class="save-btn" onclick="saveCurrentData()">LƯU</button>
        </div>

        <div class="sub-folder-container">
            <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">DANH MỤC CON:</p>
            <div id="sub-folders-list">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1ddvaaA4iQcTwEnvg0havIt6RsxcBkN4",
            authDomain: "sodocuocdoi.firebaseapp.com",
            projectId: "sodocuocdoi-fb23f",
            storageBucket: "sodocuocdoi.firebasestorage.app",
            messagingSenderId: "343754660099",
            appId: "1:343754660099:web:c916d3f1429a30b643136"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Kéo thả 3x3
        Sortable.create(document.getElementById('mainGrid'), { animation: 150 });

        let historyPath = []; // Để quay lại

        window.openBox = async (id, title) => {
            const pathId = id; 
            historyPath.push({id, title});

            document.getElementById('m-label').innerText = title;
            document.getElementById('bg-fade').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            document.getElementById('btnBack').style.display = historyPath.length > 1 ? 'block' : 'none';

            // Load dữ liệu
            const docRef = doc(db, "LifeMapV2", pathId);
            const s = await getDoc(docRef);
            
            // Hiển thị nội dung viết
            document.getElementById('m-input').value = s.exists() ? (s.data().t || "") : "";

            // Hiển thị danh sách folder con
            const listDiv = document.getElementById('sub-folders-list');
            listDiv.innerHTML = "";
            
            if (s.exists() && s.data().subs) {
                s.data().subs.forEach(sub => {
                    const item = document.createElement('div');
                    item.className = 'folder-item';
                    item.innerHTML = `<span class="folder-label">📁 ${sub.name}</span> <span>›</span>`;
                    item.onclick = () => openBox(`${pathId}_${sub.id}`, sub.name);
                    listDiv.appendChild(item);
                });
            } else {
                listDiv.innerHTML = "<p style='font-size:12px; opacity:0.5'>Chưa có mục con nào.</p>";
            }
        };

        window.saveCurrentData = async () => {
            const active = historyPath[historyPath.length - 1];
            const docRef = doc(db, "LifeMapV2", active.id);
            await setDoc(docRef, { t: document.getElementById('m-input').value }, { merge: true });
            alert("Đã lưu!");
        };

        window.addNewFolder = async () => {
            const name = prompt("Tên mục con mới:");
            if (!name) return;
            
            const active = historyPath[historyPath.length - 1];
            const subId = name.toLowerCase().replace(/\s/g, '-');
            
            // 1. Cập nhật danh sách con vào thư mục cha
            const parentRef = doc(db, "LifeMapV2", active.id);
            await setDoc(parentRef, { 
                subs: arrayUnion({ id: subId, name: name }) 
            }, { merge: true });

            // 2. Refresh lại giao diện
            const current = historyPath.pop();
            openBox(current.id, current.title);
        };

        window.closeBox = () => {
            document.getElementById('bg-fade').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
            historyPath = [];
        };

        document.getElementById('btnBack').onclick = () => {
            historyPath.pop(); // Bỏ cái hiện tại
            const prev = historyPath.pop(); // Lấy cái trước đó
            openBox(prev.id, prev.title);
        };

        document.querySelectorAll('.field-btn').forEach(btn => {
            btn.onclick = () => openBox(btn.dataset.id, btn.innerText);
        });

    </script>
</body>
</html>
