<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Manager Pro - Dark Mode Full</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-blue: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }
        h2 { text-align: center; color: var(--accent-blue); margin-bottom: 30px; }

        .category {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .category-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        button {
            background: #0f172a;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            font-size: 14px;
        }

        button:hover {
            border-color: var(--accent-blue);
            background: #1e293b;
            transform: translateY(-2px);
        }

        /* Modal */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; z-index:9; }
        #input-area {
            position: fixed; top:50%; left:50%; transform:translate(-50%, -50%);
            background: var(--bg-card); padding: 25px; border-radius: 15px;
            width: 90%; max-width: 400px; display:none; z-index:10; border: 1px solid var(--accent-blue);
        }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 5px; box-sizing: border-box;}
        .modal-btns { display: flex; gap: 10px; }
        .btn-save { background: var(--accent-blue); color: #0f172a; font-weight: bold; flex: 2; }
        .btn-cancel { background: #475569; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG QUẢN TRỊ CUỘC SỐNG</h2>

    <div class="category">
        <div class="category-title">🏠 Môi trường sống</div>
        <div class="button-group">
            <button onclick="editItem('env_nha')" id="env_nha">Nhà cửa: ...</button>
            <button onclick="editItem('env_lamviec')" id="env_lamviec">Góc làm việc: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">💼 Nghề nghiệp</div>
        <div class="button-group">
            <button onclick="editItem('job_duan')" id="job_duan">Dự án: ...</button>
            <button onclick="editItem('job_luong')" id="job_luong">Vị trí: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">👥 Hội nhóm</div>
        <div class="button-group">
            <button onclick="editItem('club_thethao')" id="club_thethao">Thể thao: ...</button>
            <button onclick="editItem('club_congdong')" id="club_congdong">Cộng đồng: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">🧠 Kỹ năng</div>
        <div class="button-group">
            <button onclick="editItem('skill_ngoaingu')" id="skill_ngoaingu">Ngoại ngữ: ...</button>
            <button onclick="editItem('skill_chuyenmon')" id="skill_chuyenmon">Chuyên môn: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">🎨 Sở thích</div>
        <div class="button-group">
            <button onclick="editItem('hobby_dv')" id="hobby_dv">Giải trí: ...</button>
            <button onclick="editItem('hobby_sangtao')" id="hobby_sangtao">Sáng tạo: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">🔄 Thói quen</div>
        <div class="button-group">
            <button onclick="editItem('habit_sang')" id="habit_sang">Sáng sớm: ...</button>
            <button onclick="editItem('habit_toi')" id="habit_toi">Trước khi ngủ: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">💰 Thu chi</div>
        <div class="button-group">
            <button onclick="editItem('fin_thu')" id="fin_thu">Tổng thu: ...</button>
            <button onclick="editItem('fin_chi')" id="fin_chi">Tổng chi: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">🌐 Mạng lưới</div>
        <div class="button-group">
            <button onclick="editItem('net_giadinh')" id="net_giadinh">Gia đình: ...</button>
            <button onclick="editItem('net_doitac')" id="net_doitac">Đối tác: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title" style="color: #fbbf24;">💎 Tài sản</div>
        <div class="button-group">
            <button onclick="editItem('asset_bds')" id="asset_bds">Bất động sản: ...</button>
            <button onclick="editItem('asset_tietkiem')" id="asset_tietkiem">Tiết kiệm: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title" style="color: #f87171;">🚀 Mục tiêu sống</div>
        <div class="button-group">
            <button onclick="editItem('goal_1nam')" id="goal_1nam">Ngắn hạn: ...</button>
            <button onclick="editItem('goal_cuocdoi')" id="goal_cuocdoi">Sứ mệnh: ...</button>
        </div>
    </div>

</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="input-area">
    <h3 id="modal-title">Cập nhật</h3>
    <input type="text" id="user-input" placeholder="Nhập nội dung mới...">
    <div class="modal-btns">
        <button class="btn-save" onclick="saveToCloud()">Lưu Cloud</button>
        <button class="btn-cancel" onclick="closeModal()">Đóng</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "THAY_BANG_API_KEY_CUA_BAN",
        authDomain: "PROJECT_CUA_BAN.firebaseapp.com",
        projectId: "PROJECT_CUA_BAN",
        storageBucket: "PROJECT_CUA_BAN.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentId = '';

    window.editItem = (id) => {
        currentId = id;
        document.getElementById('modal-title').innerText = "Sửa: " + id.replace(/_/g, ' ');
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('input-area').style.display = 'block';
    };

    window.closeModal = () => {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('input-area').style.display = 'none';
    };

    window.saveToCloud = async () => {
        const val = document.getElementById('user-input').value;
        if(!val) return;
        await setDoc(doc(db, "full_life_data", currentId), { value: val });
        document.getElementById('user-input').value = '';
        closeModal();
    };

    // Danh sách ID để lắng nghe đồng bộ
    const allIds = [
        'env_nha', 'env_lamviec', 'job_duan', 'job_luong', 'club_thethao', 'club_congdong',
        'skill_ngoaingu', 'skill_chuyenmon', 'hobby_dv', 'hobby_sangtao', 'habit_sang', 'habit_toi',
        'fin_thu', 'fin_chi', 'net_giadinh', 'net_doitac', 'asset_bds', 'asset_tietkiem', 'goal_1nam', 'goal_cuocdoi'
    ];

    allIds.forEach(id => {
        onSnapshot(doc(db, "full_life_data", id), (s) => {
            if(s.exists()){
                document.getElementById(id).innerText = id.split('_')[1].toUpperCase() + ": " + s.data().value;
            }
        });
    });
</script>
</body>
</html>
