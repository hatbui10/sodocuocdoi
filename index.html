<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Đồ Cuộc Đời - Vĩnh Viễn</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: var(--accent); font-size: 1.4rem; text-transform: uppercase; margin-bottom: 20px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        .category { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .category-title { font-weight: bold; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; }
        .category-title::before { content: ""; width: 4px; height: 14px; background: var(--accent); margin-right: 8px; border-radius: 2px; }
        .btn-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
        button.item { background: #0f172a; color: var(--text); border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 13px; transition: 0.2s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        button.item:hover { border-color: var(--accent); background: #1e293b; transform: translateY(-2px); }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; z-index:99; backdrop-filter: blur(4px); }
        #modal { position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; display:none; z-index:100; border: 1px solid var(--border); text-align: center; }
        input { width: 100%; padding: 14px; margin: 15px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-save { background: var(--accent); color: #0f172a; font-weight: bold; width: 100%; padding: 14px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; }
        .active-saved { background: var(--success) !important; color: white !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>SƠ ĐỒ CUỘC ĐỜI</h1>

    <div class="category">
        <div class="category-title">🏠 Môi trường</div>
        <div class="btn-group">
            <button class="item" onclick="edit('env_nha')" id="env_nha">Nhà cửa: ...</button>
            <button class="item" onclick="edit('env_khupho')" id="env_khupho">Khu phố: ...</button>
            <button class="item" onclick="edit('env_vieclam')" id="env_vieclam">Làm việc: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">💼 Nghề nghiệp & Kỹ năng</div>
        <div class="btn-group">
            <button class="item" onclick="edit('job_cur')" id="job_cur">Công việc: ...</button>
            <button class="item" onclick="edit('skill_pro')" id="skill_pro">Chuyên môn: ...</button>
            <button class="item" onclick="edit('skill_soft')" id="skill_soft">Kỹ năng mềm: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">🎨 Thói quen & Sở thích</div>
        <div class="btn-group">
            <button class="item" onclick="edit('habit_good')" id="habit_good">Thói quen: ...</button>
            <button class="item" onclick="edit('hobby')" id="hobby">Sở thích: ...</button>
            <button class="item" onclick="edit('club')" id="club">Hội nhóm: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title">🌐 Quan hệ</div>
        <div class="btn-group">
            <button class="item" onclick="edit('net_fam')" id="net_fam">Gia đình: ...</button>
            <button class="item" onclick="edit('net_friend')" id="net_friend">Bạn bè: ...</button>
            <button class="item" onclick="edit('net_work')" id="net_work">Đối tác: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title" style="color: #fbbf24;">💰 Tài chính</div>
        <div class="btn-group">
            <button class="item" onclick="edit('fin_in')" id="fin_in">Thu nhập: ...</button>
            <button class="item" onclick="edit('fin_out')" id="fin_out">Chi tiêu: ...</button>
            <button class="item" onclick="edit('fin_bds')" id="fin_bds">Nhà đất: ...</button>
        </div>
    </div>

    <div class="category">
        <div class="category-title" style="color: #f87171;">🚀 Mục tiêu</div>
        <div class="btn-group">
            <button class="item" onclick="edit('goal_s')" id="goal_s">Ngắn hạn: ...</button>
            <button class="item" onclick="edit('goal_l')" id="goal_l">Dài hạn: ...</button>
        </div>
    </div>
</div>

<div class="overlay" id="ovl" onclick="cls()"></div>
<div id="modal">
    <h3 id="m-t" style="margin:0; color:var(--accent);">Cập nhật</h3>
    <input type="text" id="inp" placeholder="Nhập nội dung mới...">
    <button id="btnS" class="btn-save" onclick="save()">LƯU LÊN CLOUD</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // MÃ CỦA BẠN
    const firebaseConfig = {
      apiKey: "AIzaSyD1ddvaaA4iQcTwEnvg0havIt6RsxcBkN4",
      authDomain: "sodocuocdoi.firebaseapp.com",
      projectId: "sodocuocdoi",
      storageBucket: "sodocuocdoi.firebasestorage.app",
      messagingSenderId: "343754660099",
      appId: "1:343754660099:web:c916d3f1429a30b643136",
      measurementId: "G-D5GCC4ZV73"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cur = '';

    window.edit = (id) => {
        cur = id;
        document.getElementById('m-t').innerText = "SỬA: " + id.toUpperCase();
        document.getElementById('ovl').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
        document.getElementById('inp').focus();
    };

    window.cls = () => {
        document.getElementById('ovl').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
        document.getElementById('btnS').innerText = "LƯU LÊN CLOUD";
        document.getElementById('btnS').classList.remove('active-saved');
        document.getElementById('inp').value = "";
    };

    window.save = async () => {
        const val = document.getElementById('inp').value;
        const b = document.getElementById('btnS');
        if(!val) return;
        b.innerText = "Đang lưu...";
        try {
            await setDoc(doc(db, "LifeDataFull", cur), { t: val });
            b.innerText = "Xong! ✅";
            b.classList.add('active-saved');
            setTimeout(() => { cls(); }, 700);
        } catch (e) {
            alert("Lỗi: Hãy kiểm tra tab 'Rules' trong Firebase!");
            b.innerText = "LỖI!";
        }
    };

    const ids = ['env_nha','env_khupho','env_vieclam','job_cur','skill_pro','skill_soft','habit_good','club','hobby','net_fam','net_friend','net_work','fin_in','fin_out','fin_bds','goal_s','goal_l'];
    ids.forEach(id => {
        onSnapshot(doc(db, "LifeDataFull", id), (s) => {
            if(s.exists()) {
                const label = id.split('_').pop().toUpperCase();
                document.getElementById(id).innerText = label + ": " + s.data().t;
            }
        });
    });
</script>
</body>
</html>
