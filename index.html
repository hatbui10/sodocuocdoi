<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Map - Fixed Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        #auth-section { text-align: center; margin-bottom: 20px; padding: 15px; background: #1e293b; border-radius: 12px; }
        .user-info { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .user-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }
        .login-btn { background: var(--accent); color: #0f172a; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        
        /* Chú ý: display none được ghi đè bằng JS */
        .grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        .field-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 30px 10px; border-radius: 12px; text-align: center; cursor: pointer;
            font-weight: bold; font-size: 14px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .field-btn:hover { border-color: var(--accent); background: #2d3748; }
        .add-main-btn { border: 2px dashed var(--border); background: transparent; color: var(--accent); font-size: 24px; }

        /* Icon Picker & Modals */
        #icon-picker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 2px solid var(--accent); padding: 20px; border-radius: 20px; z-index: 100; width: 90%; max-width: 400px; }
        .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .icon-item { font-size: 24px; cursor: pointer; padding: 5px; text-align: center; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; z-index:90; }
        #modal { position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; display:none; z-index:100; border: 1px solid var(--accent); }
        textarea { width: 100%; height: 100px; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
        .folder-item { background: #334155; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .save-btn { background: var(--accent); color: #0f172a; }
        .back-btn { background: #475569; color: white; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>

    <div id="auth-section">
        <div id="user-display" class="user-info" style="display:none;">
            <img id="user-photo" class="user-img" src="">
            <span id="user-name"></span>
            <button onclick="window.logout()" style="background:none; color:#ff4444; border:none; cursor:pointer;">Thoát</button>
        </div>
        <button id="login-btn" class="login-btn" onclick="window.login()">Đăng nhập bằng Google</button>
    </div>

    <h2 style="text-align: center; color: var(--accent);">MY LIFE MAP</h2>
    
    <div class="grid" id="mainGrid">
        <div class="field-btn" data-id="nha">🏠 Nhà cửa</div>
        <div class="field-btn" data-id="job">💼 Công việc</div>
        <div class="field-btn" data-id="kn">⚡ Kỹ năng</div>
        <div class="field-btn" data-id="sk">💪 Sức khỏe</div>
        <div class="field-btn" data-id="tc">💰 Tài chính</div>
        <div class="field-btn" data-id="gd">❤️ Gia đình</div>
        <div class="field-btn" data-id="bb">🤝 Bạn bè</div>
        <div class="field-btn" data-id="hv">📚 Học vấn</div>
        <div class="field-btn" data-id="gt">🎮 Giải trí</div>
        <div class="field-btn add-main-btn" id="btnAddNewMain">+</div>
    </div>

    <div id="icon-picker">
        <h4>Chọn Icon & Tên</h4>
        <input type="text" id="new-cat-name" placeholder="Tên mục..." style="width:100%; padding:10px; background:#0f172a; color:white; border:1px solid #334155; border-radius:8px; margin-bottom:10px;">
        <div class="icon-grid" id="icon-list"></div>
        <button class="save-btn" style="width:100%" onclick="confirmAddCategory()">Xác nhận</button>
    </div>

    <div class="overlay" id="bg-fade" onclick="closeBox()"></div>
    <div id="modal">
        <button class="back-btn" id="btnBack" style="display:none;">← Quay lại</button>
        <h3 id="m-label" style="margin:0; color:var(--accent)">...</h3>
        <textarea id="m-input" placeholder="Ghi chú..."></textarea>
        <div class="actions">
            <button style="background:#6366f1; color:white;" onclick="addNewFolder()">+ Mục con</button>
            <button class="save-btn" onclick="saveCurrentData()">LƯU</button>
        </div>
        <div id="sub-folders-list" style="margin-top:15px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1ddvaaA4iQcTwEnvg0havIt6RsxcBkN4",
            authDomain: "sodocuocdoi.firebaseapp.com",
            projectId: "sodocuocdoi-fb23f",
            storageBucket: "sodocuocdoi.firebasestorage.app",
            messagingSenderId: "343754660099",
            appId: "1:343754660099:web:c916d3f1429a30b643136"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let historyPath = [];
        let selectedIcon = "🚀";

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const grid = document.getElementById('mainGrid');
            if (user) {
                currentUser = user;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-display').style.display = 'flex';
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName;
                
                // HIỂN THỊ LƯỚI BẰNG JS TRỰC TIẾP
                grid.style.setProperty('display', 'grid', 'important');
                initEvents();
            } else {
                currentUser = null;
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('user-display').style.display = 'none';
                grid.style.display = 'none';
            }
        });

        function initEvents() {
            document.querySelectorAll('.field-btn').forEach(btn => {
                if(btn.id !== 'btnAddNewMain') {
                    btn.onclick = () => openBox(btn.dataset.id, btn.innerText);
                }
            });
        }

        // Tạo 30 icons
        const icons = ["🏠","💼","⚡","💪","💰","❤️","🤝","📚","🎮","🚀","🎯","🔥","✨","🎨","📸","🎵","🌍","📍","🔑","💡","⏰","📅","🛠️","🛒","🏥","🌱","🏆","📣","💻","📱"];
        const iconList = document.getElementById('icon-list');
        icons.forEach(i => {
            const s = document.createElement('span');
            s.className = 'icon-item';
            s.innerText = i;
            s.onclick = () => { selectedIcon = i; s.style.background = "#334155"; };
            iconList.appendChild(s);
        });

        window.openBox = async (id, title) => {
            if(!currentUser) return;
            historyPath.push({id, title});
            document.getElementById('m-label').innerText = title;
            document.getElementById('bg-fade').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            document.getElementById('btnBack').style.display = historyPath.length > 1 ? 'block' : 'none';

            const docRef = doc(db, "users", currentUser.uid, "LifeMapV2", id);
            const s = await getDoc(docRef);
            document.getElementById('m-input').value = s.exists() ? (s.data().t || "") : "";

            const listDiv = document.getElementById('sub-folders-list');
            listDiv.innerHTML = "";
            if (s.exists() && s.data().subs) {
                s.data().subs.forEach(sub => {
                    const item = document.createElement('div');
                    item.className = 'folder-item';
                    item.innerHTML = `<span>📂 ${sub.name}</span> <span>›</span>`;
                    item.onclick = (e) => { e.stopPropagation(); openBox(`${id}_${sub.id}`, sub.name); };
                    listDiv.appendChild(item);
                });
            }
        };

        window.saveCurrentData = async () => {
            const active = historyPath[historyPath.length - 1];
            await setDoc(doc(db, "users", currentUser.uid, "LifeMapV2", active.id), { t: document.getElementById('m-input').value }, { merge: true });
            alert("Đã lưu!");
        };

        window.addNewFolder = async () => {
            const name = prompt("Tên mục con:");
            if (!name) return;
            const active = historyPath[historyPath.length - 1];
            const subId = Date.now().toString();
            await setDoc(doc(db, "users", currentUser.uid, "LifeMapV2", active.id), { subs: arrayUnion({ id: subId, name: name }) }, { merge: true });
            const current = historyPath.pop();
            openBox(current.id, current.title);
        };

        window.closeBox = () => {
            document.getElementById('bg-fade').style.display = 'none';
            document.querySelectorAll('#modal, #icon-picker').forEach(m => m.style.display = 'none');
            historyPath = [];
        };

        document.getElementById('btnBack').onclick = () => {
            historyPath.pop();
            const prev = historyPath.pop();
            openBox(prev.id, prev.title);
        };

        Sortable.create(document.getElementById('mainGrid'), { animation: 150 });
    </script>
</body>
</html>
